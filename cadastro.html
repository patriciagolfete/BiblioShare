<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - BiblioShare</title>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Merriweather:wght@700&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">

  <style>

    body{
      font-family: 'Poppins', sans-serif;
    }

    h1, h2 {
      font-family: 'Merriweather', serif;
    }

    .form-container{
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .form-container h2{
      text-align: center;
      margin-bottom: 20px;
      color: #2e7d32;
    }

    .form-group{
      margin-bottom: 18px;
    }

    .form-group label{
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .form-group input,
    .form-group select{
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .btn-submit{
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background-color: #2e7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-submit:hover{
      background-color: #1b5e20;
    }

  </style>
</head>

<body>

  <header>
    <h1>📚 BiblioShare</h1>
    <p>Compartilhe conhecimento, compartilhe livros</p>
  </header>

  <nav>
    <a href="index.html">Início</a>
    <a href="#">Livros</a>
    <a href="cadastro.html">Cadastro</a>
    <a href="login.html">Login</a>
  </nav>

  <main class="form-container">

    <h2><i class="fa-solid fa-user-plus"></i> Cadastro</h2>

    <form action="login.html">

      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" required>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required>
      </div>

      <div class="form-group">
        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" required>
      </div>

      <div class="form-group">
        <label for="tipo">Tipo de usuário</label>

        <select id="tipo">
          <option>Leitor</option>
          <option>Doador</option>
          <option>Ambos</option>
        </select>
      </div>

      <button type="submit" class="btn-submit">
        Cadastrar
      </button>

    </form>

  </main>

  <footer>
    <p>Projeto acadêmico - BiblioShare © 2026</p>
  </footer>

</body>
</html>
