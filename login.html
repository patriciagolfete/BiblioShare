<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - BiblioShare</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Merriweather:wght@700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="topo">
    <a href="index.html">
      <img
        src="img/logo-biblioshare.png"
        alt="Logo BiblioShare"
        class="logo">
    </a>

    <form class="busca-menu">
      <label for="pesquisa" class="label-escondida">
        Pesquisar livros
      </label>

      <input
        type="text"
        id="pesquisa"
        placeholder="Pesquisar livros">

      <i class="fa-solid fa-magnifying-glass"></i>

      <div
        id="resultado-pesquisa"
        class="resultado-pesquisa">
      </div>
    </form>

    <nav class="menu">
      <a href="index.html">Início</a>
      <a href="livros.html">Livros</a>
      <a href="cadastro.html">Cadastro</a>
      <a href="login.html">Login</a>
    </nav>

    <div class="acessibilidade">

  <button id="diminuir-fonte" type="button">
    A-
  </button>

  <button id="aumentar-fonte" type="button">
    A+
  </button>

  <button id="alto-contraste" type="button">
    🌙
  </button>

</div>

  </header>

  <main class="form-container">

    <h1>
      <i class="fa-solid fa-right-to-bracket"></i>
      Entrar
    </h1>

    <form>

      <div class="form-group">
        <label for="email">E-mail</label>

        <input
          type="email"
          id="email"
          name="email"
          placeholder="Digite seu e-mail"
          required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>

        <input
          type="password"
          id="senha"
          name="senha"
          placeholder="Digite sua senha"
          required>
      </div>

      <button type="submit" class="btn-submit">
        Entrar
      </button>

    </form>

    <div class="cadastro-link">
      Não possui conta?
      <a href="cadastro.html">
        Cadastre-se
      </a>
    </div>

  </main>

  <footer>
    <p>Projeto acadêmico - BiblioShare © 2026</p>

    <div class="curriculos">
      <p>Currículos dos integrantes:</p>

      <a
        href="https://patriciagolfete.github.io/Curriculo-Vitae/"
        target="_blank">
        Patrícia Lacerda Golfete
      </a>

      <a
        href="https://m4riavit0ria.github.io/Curriculo/"
        target="_blank">
        Maria Vitória Mendes Storel
      </a>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
